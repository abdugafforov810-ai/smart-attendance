{% extends 'main/layout.html' %}

{% block content %}

<div class="card shadow-lg border-0 p-5">

    <h2 class="mb-4">
        ✅ Attendance Form
    </h2>

    <form method="POST">

        {% csrf_token %}

        <!-- STUDENT -->
        <div class="mb-3">

            <label class="form-label">
                Student
            </label>

            <select name="student"
                    class="form-select">

                {% for s in students %}

                <option value="{{ s.id }}">
                    {{ s.name }}
                </option>

                {% endfor %}

            </select>

        </div>

        <!-- STATUS -->
        <div class="mb-3">

            <label class="form-label">
                Status
            </label>

            <select name="status"
                    class="form-select">

                <option value="present">
                    ✅ Present
                </option>

                <option value="absent">
                    ❌ Absent
                </option>

                <option value="late">
                    ⏰ Late
                </option>

            </select>

        </div>

        <button class="btn btn-primary w-100">

            💾 Save Attendance

        </button>

    </form>

</div>

{% endblock %}
