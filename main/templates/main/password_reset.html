{% extends 'main/layout.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow p-4 border-0">

                <h2 class="mb-4 text-center">
                    🔑 Reset Password
                </h2>

                <form method="post">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button class="btn btn-primary w-100">

                        Send Reset Email

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
